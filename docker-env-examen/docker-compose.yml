services:

  web:

    build: .

    container_name: php-web-examen

    ports:

      - "8082:80"

    volumes:

      - ../proyecto-php-examen:/var/www/html

    depends_on:

      - db

  db:

    image: mariadb:11

    container_name: mariadb-examen

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: examen_php

      MYSQL_USER: examen

      MYSQL_PASSWORD: examen123

    volumes:

      - ./db-examen:/var/lib/mysql

    ports:

      - "3307:3306"

  phpmyadmin:

    image: phpmyadmin/phpmyadmin:latest

    container_name: phpmyadmin-examen

    restart: always

    depends_on:

      - db

    environment:

      PMA_HOST: db

      PMA_USER: examen

      PMA_PASSWORD: examen123

    ports:

      - "8083:80"

  browsersync:

    image: node:20-alpine

    container_name: browsersync-examen

    working_dir: /app

    depends_on:

      - web

    volumes:

      - ../proyecto-php-examen:/src

    command: sh -c "npm install -g browser-sync && browser-sync start --proxy 'web:80' --files '/src/**/*.*' --no-ui --host 0.0.0.0 --port 3002"

    ports:

      - "3002:3002"
